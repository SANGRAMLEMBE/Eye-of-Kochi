<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0f172a">
  <title>CityLens — കൊച്ചിയുടെ കണ്ണ്</title>
  <link rel="stylesheet" href="/vendor/leaflet.css">
  <style>
    :root { color-scheme: dark; font-family: Inter, system-ui, sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; overflow: hidden; background: #0f172a; color: #f8fafc; }
    .app-header { position: fixed; inset: 0 0 auto; z-index: 1000; height: 64px; display: flex; align-items: center; padding: 0 20px; background: rgba(15, 23, 42, .94); border-bottom: 1px solid #334155; }
    h1 { margin: 0; font-size: 1.1rem; font-weight: 750; letter-spacing: .01em; }
    #map { width: 100vw; height: 100vh; background: #172033; }
    .report-button { position: fixed; right: 20px; bottom: max(20px, env(safe-area-inset-bottom)); z-index: 1000; min-height: 48px; padding: 0 18px; border: 0; border-radius: 999px; background: #38bdf8; color: #082f49; font: inherit; font-weight: 800; cursor: pointer; box-shadow: 0 8px 24px rgba(0, 0, 0, .35); }
    .report-button:focus-visible { outline: 3px solid #f8fafc; outline-offset: 3px; }
    .leaflet-tile-pane { filter: brightness(.68) saturate(.72) contrast(1.08); }
    .leaflet-control-zoom { border: 1px solid #475569 !important; box-shadow: 0 6px 18px rgba(0, 0, 0, .35) !important; }
    .leaflet-control-zoom a { background: #0f172a !important; color: #f8fafc !important; border-color: #334155 !important; }
    .map-legend { padding: 10px 11px; min-width: 151px; border: 1px solid #334155; border-radius: 12px; background: rgba(15, 23, 42, .93); color: #e2e8f0; box-shadow: 0 8px 24px rgba(0, 0, 0, .32); font-size: .73rem; line-height: 1.35; }
    .legend-title { margin-bottom: 6px; color: #f8fafc; font-size: .8rem; font-weight: 800; }
    .legend-row { display: flex; align-items: center; gap: 7px; margin-top: 4px; }
    .legend-dot { width: 9px; height: 9px; border-radius: 50%; box-shadow: 0 0 9px currentColor; }
    .leaflet-popup-content-wrapper, .leaflet-popup-tip { background: #0f172a; color: #e2e8f0; }
    .leaflet-popup-content-wrapper { border: 1px solid #334155; border-radius: 14px; box-shadow: 0 12px 28px rgba(0, 0, 0, .45); }
    .leaflet-popup-content { width: min(250px, calc(100vw - 72px)) !important; margin: 11px; }
    .leaflet-popup-close-button { color: #cbd5e1 !important; }
    .report-popup-photo { display: grid; height: 74px; margin: -1px -1px 10px; place-items: center; border: 1px solid #475569; border-radius: 9px; background: linear-gradient(135deg, #1e293b, #0b1220); color: #94a3b8; font-size: .75rem; }
    .report-popup-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .category-badge { display: inline-flex; padding: 3px 7px; border-radius: 999px; color: #08111f; font-size: .69rem; font-weight: 850; text-transform: uppercase; }
    .severity { display: flex; gap: 3px; align-items: center; color: #94a3b8; font-size: .68rem; white-space: nowrap; }
    .severity-dots { display: inline-flex; gap: 2px; }
    .severity-dot { width: 7px; height: 7px; border-radius: 50%; background: #334155; }
    .severity-dot.active { background: currentColor; box-shadow: 0 0 5px currentColor; }
    .report-popup-description { margin: 9px 0 0; font-size: .78rem; line-height: 1.42; }
    .report-popup-description span { display: block; }
    .report-popup-time { margin-top: 8px; color: #94a3b8; font-size: .7rem; }
    .leaflet-control-attribution { background: rgba(15, 23, 42, .8) !important; color: #94a3b8 !important; }
    .leaflet-control-attribution a { color: #7dd3fc !important; }
    @media (max-width: 390px) { .app-header { height: 56px; padding: 0 16px; } .report-button { right: 16px; } }
  </style>
</head>
<body>
  <header class="app-header"><h1>CityLens — കൊച്ചിയുടെ കണ്ണ്</h1></header>
  <main id="map" aria-label="Kochi civic reports map"></main>
  <button class="report-button" type="button">Report / റിപ്പോർട്ട്</button>
  <script src="/vendor/leaflet.js"></script>
  <script>
    const categories = {
      waterlogging: { color: '#38bdf8', label: 'Waterlogging', ml: 'വെള്ളക്കെട്ട്' }, pothole: { color: '#f59e0b', label: 'Pothole', ml: 'കുഴി' }, streetlight: { color: '#facc15', label: 'Streetlight', ml: 'തെരുവുവിളക്ക്' }, garbage: { color: '#4ade80', label: 'Garbage', ml: 'മാലിന്യം' }, fallen_tree: { color: '#a78bfa', label: 'Fallen tree', ml: 'വീണ മരം' }, other: { color: '#94a3b8', label: 'Other', ml: 'മറ്റുള്ളവ' }
    };
    const map = L.map('map', { zoomControl: false, minZoom: 11 }).setView([9.9816, 76.2999], 13);
    L.control.zoom({ position: 'bottomleft' }).addTo(map);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { subdomains: 'abcd', maxZoom: 20, attribution: '&copy; OpenStreetMap contributors &copy; CARTO' }).addTo(map);
    const escapeHtml = (value) => String(value || '').replace(/[&<>"']/g, (character) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[character]));
    const relativeTime = (timestamp) => { const minutes = Math.max(0, Math.floor((Date.now() - new Date(timestamp).getTime()) / 60000)); if (minutes < 60) return `${minutes || 1} min ago / ${minutes || 1} മിനിറ്റ് മുമ്പ്`; const hours = Math.floor(minutes / 60); if (hours < 24) return `${hours}h ago / ${hours} മണിക്കൂർ മുമ്പ്`; const days = Math.floor(hours / 24); return `${days}d ago / ${days} ദിവസം മുമ്പ്`; };
    const popup = (report, category) => { const dots = Array.from({ length: 5 }, (_, index) => `<i class="severity-dot ${index < report.severity ? 'active' : ''}"></i>`).join(''); return `<article class="report-popup"><div class="report-popup-photo" aria-label="Photo placeholder">📷 Photo / ഫോട്ടോ</div><div class="report-popup-top"><span class="category-badge" style="background:${category.color}">${category.label} · ${category.ml}</span><span class="severity" style="color:${category.color}"><span class="severity-dots">${dots}</span> ${report.severity}/5</span></div><p class="report-popup-description"><span>${escapeHtml(report.description_en)}</span><span lang="ml">${escapeHtml(report.description_ml)}</span></p><div class="report-popup-time">${relativeTime(report.timestamp)}</div></article>`; };
    const legend = L.control({ position: 'bottomright' });
    legend.onAdd = () => { const element = L.DomUtil.create('section', 'map-legend'); element.setAttribute('aria-label', 'Report category legend'); element.innerHTML = `<div class="legend-title">Live reports / തത്സമയ റിപ്പോർട്ടുകൾ</div>${Object.values(categories).map((category) => `<div class="legend-row"><i class="legend-dot" style="background:${category.color};color:${category.color}"></i>${category.label} · ${category.ml}</div>`).join('')}`; L.DomEvent.disableClickPropagation(element); return element; };
    legend.addTo(map);
    fetch('/seed.json').then((response) => response.ok ? response.json() : Promise.reject(new Error('Seed reports unavailable'))).then((reports) => reports.forEach((report) => { const category = categories[report.category] || categories.other; L.circleMarker([report.lat, report.lng], { radius: 6 + report.severity * 2.2, color: category.color, weight: 2, fillColor: category.color, fillOpacity: .7, bubblingMouseEvents: false }).bindPopup(popup(report, category), { maxWidth: 270, minWidth: 210 }).addTo(map); })).catch(() => console.warn('Seed reports could not be loaded.'));
  </script>
</body>
</html>
