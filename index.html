<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0f172a">
  <title>CityLens — കൊച്ചിയുടെ കണ്ണ്</title>
  <link rel="stylesheet" href="/vendor/leaflet.css">
  <style>
    :root { color-scheme: dark; font-family: Inter, system-ui, sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; overflow: hidden; background: #0f172a; color: #f8fafc; }
    button, input { font: inherit; }
    .app-header { position: fixed; inset: 0 0 auto; z-index: 1000; height: 64px; display: flex; align-items: center; padding: 0 20px; background: rgba(15, 23, 42, .94); border-bottom: 1px solid #334155; }
    h1 { margin: 0; font-size: 1.1rem; font-weight: 750; letter-spacing: .01em; }
    .report-count { margin-left: auto; padding: 4px 11px; border: 1px solid #334155; border-radius: 999px; background: #1e293b; color: #7dd3fc; font-size: .72rem; font-weight: 800; white-space: nowrap; }
    #map { width: 100vw; height: 100vh; background: #172033; }
    .report-button { position: fixed; right: 20px; bottom: max(20px, env(safe-area-inset-bottom)); z-index: 1000; min-height: 48px; padding: 0 18px; border: 0; border-radius: 999px; background: #38bdf8; color: #082f49; font-weight: 800; cursor: pointer; box-shadow: 0 8px 24px rgba(0, 0, 0, .35); }
    .leaflet-tile-pane { filter: brightness(.68) saturate(.72) contrast(1.08); }
    .leaflet-control-zoom { border: 1px solid #475569 !important; box-shadow: 0 6px 18px rgba(0, 0, 0, .35) !important; }
    .leaflet-control-zoom a { background: #0f172a !important; color: #f8fafc !important; border-color: #334155 !important; }
    .map-legend { padding: 10px 11px; min-width: 151px; border: 1px solid #334155; border-radius: 12px; background: rgba(15, 23, 42, .93); color: #e2e8f0; box-shadow: 0 8px 24px rgba(0, 0, 0, .32); font-size: .73rem; line-height: 1.35; }
    .legend-title { margin-bottom: 6px; color: #f8fafc; font-size: .8rem; font-weight: 800; }.legend-row { display: flex; align-items: center; gap: 7px; margin-top: 4px; }.legend-dot { width: 9px; height: 9px; border-radius: 50%; box-shadow: 0 0 9px currentColor; }
    .leaflet-popup-content-wrapper, .leaflet-popup-tip { background: #0f172a; color: #e2e8f0; }.leaflet-popup-content-wrapper { border: 1px solid #334155; border-radius: 14px; }.leaflet-popup-content { width: min(250px, calc(100vw - 72px)) !important; margin: 11px; }.leaflet-popup-close-button { color: #cbd5e1 !important; }
    .report-popup-photo { display: grid; height: 74px; margin: -1px -1px 10px; place-items: center; border: 1px solid #475569; border-radius: 9px; background: linear-gradient(135deg, #1e293b, #0b1220); color: #94a3b8; font-size: .75rem; }.report-popup-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }.category-badge { display: inline-flex; padding: 3px 7px; border-radius: 999px; color: #08111f; font-size: .69rem; font-weight: 850; text-transform: uppercase; }.severity { display: flex; gap: 3px; align-items: center; font-size: .68rem; white-space: nowrap; }.severity-dots { display: inline-flex; gap: 2px; }.severity-dot { width: 7px; height: 7px; border-radius: 50%; background: #334155; }.severity-dot.active { background: currentColor; box-shadow: 0 0 5px currentColor; }.report-popup-description { margin: 9px 0 0; font-size: .78rem; line-height: 1.42; }.report-popup-description span { display: block; }.report-popup-time { margin-top: 8px; color: #94a3b8; font-size: .7rem; }
    .leaflet-control-attribution { background: rgba(15, 23, 42, .8) !important; color: #94a3b8 !important; }.leaflet-control-attribution a { color: #7dd3fc !important; }
    .sheet-backdrop { position: fixed; inset: 0; z-index: 1100; background: rgba(2, 6, 23, .62); opacity: 0; pointer-events: none; transition: opacity .2s; }.sheet-backdrop.visible { opacity: 1; pointer-events: auto; }
    .report-sheet { position: fixed; z-index: 1200; inset: auto 0 0; max-height: min(85vh, 720px); overflow: auto; padding: 10px 18px calc(20px + env(safe-area-inset-bottom)); border-radius: 22px 22px 0 0; background: #0f172a; border: 1px solid #334155; transform: translateY(105%); transition: transform .25s ease; box-shadow: 0 -12px 40px rgba(0, 0, 0, .45); }.report-sheet.open { transform: translateY(0); }.sheet-handle { width: 38px; height: 4px; margin: 0 auto 10px; border-radius: 99px; background: #475569; }.sheet-header { display:flex; align-items:center; justify-content:space-between; gap:12px; }.sheet-header h2 { margin: 0; font-size: 1.05rem; }.close-sheet { border:0; border-radius:50%; width:32px; height:32px; background:#1e293b; color:#cbd5e1; cursor:pointer; }.step { margin-top: 16px; }.step-title { display:block; margin-bottom:7px; color:#e2e8f0; font-size:.82rem; font-weight:800; }.photo-picker { display:grid; min-height:76px; place-items:center; border:1px dashed #64748b; border-radius:12px; color:#bae6fd; cursor:pointer; text-align:center; }.photo-picker input { display:none; }.photo-preview { width:100%; max-height:150px; margin-top:8px; object-fit:cover; border-radius:12px; border:1px solid #334155; }.location-status { margin:0; color:#cbd5e1; font-size:.8rem; }.location-map { height:170px; margin-top:8px; border:1px solid #475569; border-radius:12px; overflow:hidden; }.hidden { display:none !important; }.severity-picker { display:flex; gap:7px; }.severity-picker button { width:38px; height:38px; border:1px solid #475569; border-radius:50%; background:#1e293b; color:#e2e8f0; font-weight:800; cursor:pointer; }.severity-picker button.selected { border-color:#f59e0b; background:#f59e0b; color:#1c1917; }.submit-report { width:100%; min-height:48px; margin-top:18px; border:0; border-radius:12px; background:#38bdf8; color:#082f49; font-weight:850; cursor:pointer; }.submit-report:disabled { opacity:.55; cursor:not-allowed; }.verdict-card { margin-top:16px; padding:12px; border:1px solid #38bdf8; border-radius:12px; background:#082f49; }.verdict-card h3 { margin:0 0 6px; font-size:.92rem; }.verdict-card p { margin:4px 0; color:#dbeafe; font-size:.8rem; line-height:1.35; }.verifying { display:flex; align-items:center; gap:9px; margin-top:14px; color:#bae6fd; font-size:.85rem; }.spinner { width:17px; height:17px; border:2px solid #475569; border-top-color:#38bdf8; border-radius:50%; animation: spin .7s linear infinite; } @keyframes spin { to { transform: rotate(360deg); } }
    .verdict-card.green { border-color:#4ade80; background:#052e16; }.verdict-card.green h3 { color:#86efac; }.verdict-card.amber { border-color:#f59e0b; background:#451a03; }.verdict-card.amber h3 { color:#fcd34d; }.verdict-card.offline { border:1.5px dashed #94a3b8; background:#1e293b; }.verdict-card.offline h3 { color:#cbd5e1; }
    .confidence-track { height:6px; margin:8px 0 3px; border-radius:99px; background:#334155; overflow:hidden; }.confidence-fill { height:100%; border-radius:99px; background:linear-gradient(90deg,#22c55e,#4ade80); }
    .complaint-block { margin-top:10px; padding:9px 10px; border:1px solid #334155; border-radius:10px; background:rgba(2,6,23,.5); }.complaint-block strong { display:block; margin-bottom:4px; color:#e2e8f0; font-size:.74rem; }.complaint-block p { margin:0 0 6px; }
    .copy-button { padding:4px 12px; border:1px solid #475569; border-radius:8px; background:#1e293b; color:#e2e8f0; font-size:.72rem; cursor:pointer; }.copy-button:active { background:#334155; }
    @media (max-width: 390px) { .app-header { height: 56px; padding: 0 16px; }.report-button { right:16px; }.report-sheet { padding-inline:16px; } }
  </style>
</head>
<body>
  <header class="app-header"><h1>CityLens — കൊച്ചിയുടെ കണ്ണ്</h1><span class="report-count" id="report-count" hidden>0</span></header>
  <main id="map" aria-label="Kochi civic reports map"></main>
  <button class="report-button" id="open-report" type="button">Report / റിപ്പോർട്ട്</button>
  <div class="sheet-backdrop" id="sheet-backdrop"></div>
  <section class="report-sheet" id="report-sheet" aria-label="New civic report" aria-hidden="true">
    <div class="sheet-handle"></div><div class="sheet-header"><h2>New report / പുതിയ റിപ്പോർട്ട്</h2><button class="close-sheet" id="close-sheet" aria-label="Close report form">×</button></div>
    <form id="report-form">
      <div class="step"><label class="step-title">1. Photo / ഫോട്ടോ</label><label class="photo-picker">📷 Add a photo / ഫോട്ടോ ചേർക്കുക<input id="report-photo" type="file" accept="image/*" capture="environment" required></label><img class="photo-preview hidden" id="photo-preview" alt="Selected report photo preview"></div>
      <div class="step"><span class="step-title">2. Location / സ്ഥലം</span><p class="location-status" id="location-status">Finding GPS… / GPS കണ്ടെത്തുന്നു…</p><div id="location-fallback" class="hidden"><p class="location-status">Tap the map to set the spot / സ്ഥലം തിരഞ്ഞെടുക്കാൻ മാപ്പിൽ ടാപ്പ് ചെയ്യുക</p><div id="location-map" class="location-map" aria-label="Tap to set report location"></div></div></div>
      <div class="step"><span class="step-title">3. Severity / തീവ്രത</span><div class="severity-picker" role="radiogroup" aria-label="Report severity"><button type="button" data-severity="1">1</button><button type="button" data-severity="2">2</button><button type="button" data-severity="3" class="selected">3</button><button type="button" data-severity="4">4</button><button type="button" data-severity="5">5</button></div></div>
      <button class="submit-report" id="submit-report" type="submit">Submit for AI review / AI പരിശോധനയ്ക്ക് അയയ്ക്കുക</button>
    </form>
    <div class="verifying hidden" id="verifying"><i class="spinner"></i>AI verifying… / AI പരിശോധിക്കുന്നു…</div><div class="verdict-card hidden" id="verdict-card"></div>
  </section>
  <script src="/vendor/leaflet.js"></script>
  <script>
    const categories = { waterlogging:{color:'#38bdf8',label:'Waterlogging',ml:'വെള്ളക്കെട്ട്'}, pothole:{color:'#f59e0b',label:'Pothole',ml:'കുഴി'}, streetlight:{color:'#facc15',label:'Streetlight',ml:'തെരുവുവിളക്ക്'}, garbage:{color:'#4ade80',label:'Garbage',ml:'മാലിന്യം'}, fallen_tree:{color:'#a78bfa',label:'Fallen tree',ml:'വീണ മരം'}, other:{color:'#94a3b8',label:'Other',ml:'മറ്റുള്ളവ'} };
    const map = L.map('map',{zoomControl:false,minZoom:11}).setView([9.9816,76.2999],13); L.control.zoom({position:'bottomleft'}).addTo(map); L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{subdomains:'abcd',maxZoom:20,attribution:'&copy; OpenStreetMap contributors &copy; CARTO'}).addTo(map);
    const escapeHtml = value => String(value || '').replace(/[&<>"']/g, character => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[character]));
    const relativeTime = timestamp => { const minutes=Math.max(0,Math.floor((Date.now()-new Date(timestamp).getTime())/60000)); if(minutes<60)return `${minutes||1} min ago / ${minutes||1} മിനിറ്റ് മുമ്പ്`; const hours=Math.floor(minutes/60); if(hours<24)return `${hours}h ago / ${hours} മണിക്കൂർ മുമ്പ്`; return `${Math.floor(hours/24)}d ago / ${Math.floor(hours/24)} ദിവസം മുമ്പ്`; };
    const popup = (report,category) => { const dots=Array.from({length:5},(_,index)=>`<i class="severity-dot ${index<report.severity?'active':''}"></i>`).join(''); return `<article class="report-popup"><div class="report-popup-photo">📷 Photo / ഫോട്ടോ</div><div class="report-popup-top"><span class="category-badge" style="background:${category.color}">${category.label} · ${category.ml}</span><span class="severity" style="color:${category.color}"><span class="severity-dots">${dots}</span> ${report.severity}/5</span></div><p class="report-popup-description"><span>${escapeHtml(report.description_en)}</span><span lang="ml">${escapeHtml(report.description_ml)}</span></p><div class="report-popup-time">${relativeTime(report.timestamp)}</div></article>`; };
    const addReportPin = report => { const category=categories[report.category]||categories.other; return L.circleMarker([report.lat,report.lng],{radius:6+report.severity*2.2,color:category.color,weight:2,fillColor:category.color,fillOpacity:.7,bubblingMouseEvents:false}).bindPopup(popup(report,category),{maxWidth:270,minWidth:210}).addTo(map); };
    const legend=L.control({position:'bottomright'}); legend.onAdd=()=>{const el=L.DomUtil.create('section','map-legend');el.innerHTML=`<div class="legend-title">Live reports / തത്സമയ റിപ്പോർട്ടുകൾ</div>${Object.values(categories).map(category=>`<div class="legend-row"><i class="legend-dot" style="background:${category.color};color:${category.color}"></i>${category.label} · ${category.ml}</div>`).join('')}`;L.DomEvent.disableClickPropagation(el);return el;};legend.addTo(map);
    const countBadge=document.querySelector('#report-count');let reportCount=0;const bumpCount=added=>{reportCount+=added;countBadge.hidden=false;countBadge.textContent=`${reportCount} reports / റിപ്പോർട്ടുകൾ`;};
    fetch('/seed.json').then(response=>response.ok?response.json():Promise.reject()).then(reports=>{reports.forEach(addReportPin);bumpCount(reports.length);}).catch(()=>console.warn('Seed reports could not be loaded.'));

    const sheet=document.querySelector('#report-sheet'), backdrop=document.querySelector('#sheet-backdrop'), form=document.querySelector('#report-form'), photoInput=document.querySelector('#report-photo'), preview=document.querySelector('#photo-preview'), status=document.querySelector('#location-status'), fallback=document.querySelector('#location-fallback'), verifying=document.querySelector('#verifying'), verdictCard=document.querySelector('#verdict-card'); let severity=3, reportLocation=null, fallbackMap=null, fallbackPin=null, photoBase64=null;
    const openSheet=()=>{form.classList.remove('hidden');verifying.classList.add('hidden');verdictCard.classList.add('hidden');sheet.classList.add('open');backdrop.classList.add('visible');sheet.setAttribute('aria-hidden','false');requestLocation();}; const closeSheet=()=>{sheet.classList.remove('open');backdrop.classList.remove('visible');sheet.setAttribute('aria-hidden','true');}; document.querySelector('#open-report').addEventListener('click',openSheet);document.querySelector('#close-sheet').addEventListener('click',closeSheet);backdrop.addEventListener('click',closeSheet);
    const showFallback=()=>{fallback.classList.remove('hidden');status.textContent='GPS unavailable — choose on map / GPS ലഭ്യമല്ല — മാപ്പിൽ തിരഞ്ഞെടുക്കുക';if(!fallbackMap){fallbackMap=L.map('location-map',{zoomControl:false,attributionControl:false}).setView([9.9816,76.2999],13);L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{subdomains:'abcd',maxZoom:20}).addTo(fallbackMap);fallbackMap.on('click',event=>{reportLocation=event.latlng;if(fallbackPin)fallbackPin.setLatLng(reportLocation);else fallbackPin=L.circleMarker(reportLocation,{radius:9,color:'#38bdf8',fillColor:'#38bdf8',fillOpacity:.8}).addTo(fallbackMap);status.textContent='Location set / സ്ഥലം തിരഞ്ഞെടുത്തു';});}setTimeout(()=>fallbackMap.invalidateSize(),50);};
    const requestLocation=()=>{reportLocation=null;fallback.classList.add('hidden');status.textContent='Finding GPS… / GPS കണ്ടെത്തുന്നു…';if(!navigator.geolocation){showFallback();return;}navigator.geolocation.getCurrentPosition(position=>{reportLocation={lat:position.coords.latitude,lng:position.coords.longitude};status.textContent='GPS location ready / GPS സ്ഥാനം ലഭിച്ചു';},showFallback,{enableHighAccuracy:true,timeout:5000,maximumAge:0});};
    document.querySelectorAll('[data-severity]').forEach(button=>button.addEventListener('click',()=>{severity=Number(button.dataset.severity);document.querySelectorAll('[data-severity]').forEach(item=>item.classList.toggle('selected',Number(item.dataset.severity)===severity));}));
    const downscaleImage=file=>new Promise((resolve,reject)=>{const reader=new FileReader();reader.onerror=reject;reader.onload=()=>{const image=new Image();image.onerror=reject;image.onload=()=>{const scale=Math.min(1,1024/Math.max(image.width,image.height));const canvas=document.createElement('canvas');canvas.width=Math.round(image.width*scale);canvas.height=Math.round(image.height*scale);canvas.getContext('2d').drawImage(image,0,0,canvas.width,canvas.height);resolve(canvas.toDataURL('image/jpeg',.82));};image.src=reader.result;};reader.readAsDataURL(file);});
    photoInput.addEventListener('change',async()=>{const file=photoInput.files[0];if(!file)return;photoBase64=await downscaleImage(file);preview.src=photoBase64;preview.classList.remove('hidden');});
    const OFFLINE_VERDICT={verified:null,offline:true}; const pendingReports=[]; let retryArmed=false;
    const triage=async submission=>{try{const response=await fetch('/api/triage',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(submission)});if(!response.ok)return {...OFFLINE_VERDICT};const verdict=await response.json();return verdict&&typeof verdict==='object'&&!verdict.offline&&verdict.verified!==null?verdict:{...OFFLINE_VERDICT};}catch{return {...OFFLINE_VERDICT};}};
    const animatePin=(pin,target)=>{let radius=2;pin.setRadius(radius);const step=()=>{radius+=Math.max(.6,(target-radius)*.25);pin.setRadius(Math.min(radius,target));if(radius<target)requestAnimationFrame(step);};requestAnimationFrame(step);};
    const dropVerifiedPin=(verdict,submission)=>{const report={id:`live-${Date.now()}`,category:verdict.category,severity:verdict.severity||submission.severity,lat:submission.lat,lng:submission.lng,description_en:verdict.complaint_en,description_ml:verdict.complaint_ml,timestamp:new Date().toISOString()};const pin=addReportPin(report);bumpCount(1);map.setView([submission.lat,submission.lng],15);animatePin(pin,6+report.severity*2.2);pin.openPopup();};
    const complaintBlock=(label,text)=>`<div class="complaint-block"><strong>${label}</strong><p>${escapeHtml(text)}</p><button type="button" class="copy-button">Copy / പകർത്തുക</button></div>`;
    const renderVerdict=verdict=>{verifying.classList.add('hidden');verdictCard.classList.remove('hidden','green','amber','offline');
      if(verdict.offline){verdictCard.classList.add('offline');verdictCard.innerHTML=`<h3>Offline mode / ഓഫ്‌ലൈൻ മോഡ്</h3><p>Report saved locally — AI verification pending / റിപ്പോർട്ട് പ്രാദേശികമായി സംരക്ഷിച്ചു — AI പരിശോധന തീർപ്പാക്കാനുണ്ട്</p><p>It will retry automatically when you are back online / ഓൺലൈനായാൽ സ്വയമേവ വീണ്ടും ശ്രമിക്കും</p>`;return;}
      if(verdict.verified){const category=categories[verdict.category]||categories.other;const confidence=Math.round((verdict.confidence||0)*100);verdictCard.classList.add('green');verdictCard.innerHTML=`<h3>✓ Verified / സ്ഥിരീകരിച്ചു</h3><p><strong>${category.label} · ${category.ml}</strong> · Severity ${verdict.severity}/5</p><div class="confidence-track"><div class="confidence-fill" style="width:${confidence}%"></div></div><p>Confidence / ആത്മവിശ്വാസം: ${confidence}%</p>${complaintBlock('Complaint — English',verdict.complaint_en)}${complaintBlock('പരാതി — മലയാളം',verdict.complaint_ml)}`;verdictCard.querySelectorAll('.copy-button').forEach(button=>button.addEventListener('click',()=>{navigator.clipboard?.writeText(button.parentElement.querySelector('p').textContent);button.textContent='Copied ✓ / പകർത്തി';}));return;}
      verdictCard.classList.add('amber');verdictCard.innerHTML=`<h3>✗ Not verified / സ്ഥിരീകരിച്ചിട്ടില്ല</h3><p>${escapeHtml(verdict.reason||'The photo does not show a public civic issue.')}</p><p>Only verified reports reach the map — no spam gets through. / സ്ഥിരീകരിച്ച റിപ്പോർട്ടുകൾ മാത്രമേ മാപ്പിൽ എത്തൂ.</p>`;};
    const armRetry=()=>{if(retryArmed)return;retryArmed=true;window.addEventListener('online',async()=>{while(pendingReports.length){const submission=pendingReports[0];const verdict=await triage(submission);if(verdict.offline)break;pendingReports.shift();renderVerdict(verdict);if(verdict.verified)dropVerifiedPin(verdict,submission);}});};
    form.addEventListener('submit',async event=>{event.preventDefault();if(!photoBase64){status.textContent='Add a photo first / ആദ്യം ഒരു ഫോട്ടോ ചേർക്കുക';return;}if(!reportLocation){showFallback();status.textContent='Set a location before submitting / അയയ്ക്കുന്നതിന് മുമ്പ് സ്ഥലം തിരഞ്ഞെടുക്കുക';return;}const submitButton=document.querySelector('#submit-report');submitButton.disabled=true;const submission={photo:photoBase64,lat:reportLocation.lat,lng:reportLocation.lng,severity};form.classList.add('hidden');verifying.classList.remove('hidden');verdictCard.classList.add('hidden');const verdict=await triage(submission);submitButton.disabled=false;if(verdict.offline){pendingReports.push(submission);armRetry();}renderVerdict(verdict);if(verdict.verified)dropVerifiedPin(verdict,submission);});
  </script>
</body>
</html>
